<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gnome Sort</title>
    <style>
        :root { 
            --bg: #000000; 
            --bar: #ffffff; 
            --active: #ff0000; 
            --success: #00ff00;
        }
        body { 
            background: var(--bg); 
            color: white; 
            font-family: 'Courier New', monospace;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
        }
        #visualizer { 
            display: flex; 
            align-items: flex-end; 
            height: 250px; 
            width: 400px;
            gap: 8px; 
            padding: 40px;
            background: #000;
        }
        .bar { 
            flex: 1; 
            background: var(--bar); 
            opacity: 0.8;
            transition: height 0.08s ease-in-out; 
        }
        .active { 
            background: var(--active) !important; 
            opacity: 1;
            box-shadow: 0 0 20px var(--active);
        }
        .success { 
            background: var(--success) !important;
            box-shadow: 0 0 10px var(--success);
        }
        .controls { margin-top: 50px; }
        button { 
            background: none; 
            color: #555; 
            border: 1px solid #333; 
            padding: 10px 20px; 
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        button:hover { color: #fff; border-color: #fff; }
    </style>
</head>
<body>

    <div id="visualizer"></div>

    <div class="controls">
        <button id="start" onclick="runSort()">Execute Sort</button>
    </div>

    <script>
        const container = document.getElementById('visualizer');
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let arr = [];
        const n_elements = 13; // Exactly 13 towers like the video

        function init() {
            // Generate 13 random heights
            arr = Array.from({length: n_elements}, () => Math.floor(Math.random() * 80) + 15);
            render();
        }

        function render(activePos = -1, isDone = false) {
            container.innerHTML = '';
            arr.forEach((val, i) => {
                const bar = document.createElement('div');
                bar.className = 'bar';
                if (i === activePos) bar.classList.add('active');
                if (isDone) bar.classList.add('success');
                bar.style.height = `${val}%`;
                container.appendChild(bar);
            });
        }

        function playSound(val, isSwap = false) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Use 'square' or 'triangle' for that retro "blip" sound in the video
            osc.type = isSwap ? 'triangle' : 'sine';
            
            // Map height to a sharp musical frequency
            const freq = 300 + (val * 12);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(0.05, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.05);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }

        async function playVictory() {
            const notes = [523.25, 659.25, 783.99, 1046.50];
            for (let f of notes) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.frequency.value = f;
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.4);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.4);
                await new Promise(r => setTimeout(r, 100));
            }
        }

        // Exact logic from your provided image
        async function runSort() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            
            let pos = 0;
            const n = arr.length; //

            while (pos < n) { //
                render(pos);
                playSound(arr[pos], false);
                await new Promise(r => setTimeout(r, 80));

                if (pos === 0 || arr[pos] >= arr[pos - 1]) { //
                    pos++; //
                } else {
                    // Swap logic from image
                    [arr[pos], arr[pos - 1]] = [arr[pos - 1], arr[pos]]; //
                    pos--; //
                    
                    playSound(arr[pos], true); // High pitch for the swap
                    render(pos);
                    await new Promise(r => setTimeout(r, 80));
                }
            }
            
            render(-1, true);
            await playVictory();
        }

        init();
    </script>
</body>
</html>
