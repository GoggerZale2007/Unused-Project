<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MeRepeat - System Settings</title>
    <style>
        :root {
            --android-blue: #1a73e8;
            --bg-color: #ffffff;
            --secondary-bg: #f1f3f4;
            --text-main: #202124;
            --text-sub: #5f6368;
        }

        body {
            font-family: 'Roboto', sans-serif, Arial;
            background-color: var(--secondary-bg);
            color: var(--text-main);
            margin: 0;
            display: flex;
            justify-content: center;
        }

        .phone-container {
            width: 100%;
            max-width: 480px;
            background: var(--bg-color);
            min-height: 100vh;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        header {
            padding: 48px 24px 16px;
            border-bottom: 1px solid #e0e0e0;
        }

        h1 {
            font-size: 22px;
            font-weight: 400;
            margin: 0;
        }

        .setting-row {
            padding: 20px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.1s;
            border-bottom: 1px solid #f1f1f1;
            outline: none;
        }

        /* The signature MeRepeat green/blue focus box */
        .setting-row.active-focus, .description.active-focus {
            outline: 4px solid var(--android-blue) !important;
            outline-offset: -4px;
            background-color: rgba(26, 115, 232, 0.08);
        }

        .text-group {
            display: flex;
            flex-direction: column;
            pointer-events: none;
        }

        .title {
            font-size: 16px;
            font-weight: 500;
        }

        .status {
            font-size: 14px;
            color: var(--text-sub);
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            width: 40px;
            height: 20px;
            pointer-events: none;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #bdc1c6;
            transition: .3s;
            border-radius: 20px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 14px; width: 14px;
            left: 3px; bottom: 3px;
            background-color: white;
            transition: .3s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: var(--android-blue); }
        input:checked + .slider:before { transform: translateX(20px); }

        .description {
            padding: 24px;
            font-size: 14px;
            color: var(--text-sub);
            line-height: 1.4;
            background: var(--secondary-bg);
        }
    </style>
</head>
<body>

<div class="phone-container">
    <header>
        <h1>Accessibility</h1>
    </header>

    <div class="setting-row" id="toggle-row" tabindex="0">
        <div class="text-group">
            <span class="title">Use MeRepeat</span>
            <span id="label-state" class="status">Off</span>
        </div>
        <label class="switch">
            <input type="checkbox" id="master-switch">
            <span class="slider"></span>
        </label>
    </div>

    <div class="description" tabindex="0">
        When MeRepeat is on, it provides spoken feedback so you can use your device without looking at the screen. MeRepeat describes your actions and informs you of notifications and alerts.
    </div>

    <div class="setting-row" tabindex="0">
        <div class="text-group">
            <span class="title">MeRepeat Shortcut</span>
            <span class="status">Hold volume keys</span>
        </div>
    </div>

    <div class="setting-row" tabindex="0">
        <div class="text-group">
            <span class="title">Speech rate</span>
            <span class="status">Fast (1.2x)</span>
        </div>
    </div>
</div>

<script>
    const masterSwitch = document.getElementById('master-switch');
    const labelState = document.getElementById('label-state');
    const toggleRow = document.getElementById('toggle-row');
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    let isEnabled = false;

    // --- Sound Engine ---
    const Sounds = {
        play: (freq, duration, vol = 0.1) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        },
        tick: () => Sounds.play(1000, 0.05, 0.05),
        on: () => { 
            Sounds.play(500, 0.1); 
            setTimeout(() => Sounds.play(800, 0.1), 80); 
        },
        off: () => { 
            Sounds.play(800, 0.1); 
            setTimeout(() => Sounds.play(500, 0.1), 80); 
        }
    };

    // --- Voice Engine ---
    function speak(text) {
        window.speechSynthesis.cancel();
        const utterance = new SpeechSynthesisUtterance(text);
        utterance.rate = 1.2;
        utterance.pitch = 1.0;
        window.speechSynthesis.speak(utterance);
    }

    // --- Event Handling ---
    function handleToggle() {
        isEnabled = masterSwitch.checked;
        labelState.innerText = isEnabled ? "On" : "Off";
        
        if (isEnabled) {
            Sounds.on();
            speak("MeRepeat turned on. Accessibility settings.");
        } else {
            Sounds.off();
            speak("MeRepeat turned off.");
            document.querySelectorAll('.active-focus').forEach(el => el.classList.remove('active-focus'));
        }
    }

    // Toggle logic
    toggleRow.addEventListener('click', (e) => {
        masterSwitch.checked = !masterSwitch.checked;
        handleToggle();
    });

    // Global tap detector for repeating items
    document.addEventListener('click', (e) => {
        if (!isEnabled) return;
        
        const target = e.target.closest('[tabindex="0"]');
        if (target && target !== toggleRow) {
            Sounds.tick();
            
            // Highlight
            document.querySelectorAll('.active-focus').forEach(el => el.classList.remove('active-focus'));
            target.classList.add('active-focus');

            // Find text to repeat
            const title = target.querySelector('.title')?.innerText || "";
            const status = target.querySelector('.status')?.innerText || "";
            const body = target.classList.contains('description') ? target.innerText : "";
            
            speak(`${title} ${status} ${body}`);
        }
    }, true);

</script>
</body>
  </html>
